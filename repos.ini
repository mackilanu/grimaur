# grimoire repo aliases -- example / reference.
# DO NOT EDIT ME: Lives at $XDG_CONFIG_HOME/grimoire/repos.ini
# You can do grimaur --help once to make sure it exists.
#
# Each [NAME] is a source. Section order is precedence: with no --repo, install / fetch /
# inspect / update walk sections top to bottom and use the FIRST that has the package (the
# rest are fallbacks); --repo <NAME> forces one. A bare `search` queries every section and
# merges the results (like `pacman -Ss`). Can be managed with `grimoire repo --add/--rm/--ls`.
# 
# URL placeholders, substituted per package:
#   {pkg}      -> the package name
#   {pkgbase}  -> its pkgbase (from the local pacman sync DBs, so split packages resolve)
# Scheme is optional (github.com/u/r == https://github.com/u/r); tree / blob / raw
# forge links are all accepted. Per-command --rev <branch|tag|commit> / --subdir <dir> override.

# --- DEFAULT: Arch's official packages, one git repo per pkgbase on the Arch GitLab.
# A bare `grimoire install <pkg>` builds the official package from source.
[ARCH]
https://gitlab.archlinux.org/archlinux/packaging/packages/{pkgbase}.git

# 1) Single package -- PKGBUILD at the repo root (or <pkg>/, auto-descended). For a one-off
#    just use --repo-url <url> instead of registering an alias.
#[SOLO]
#  github.com/myuser/my-pkg

# 2) Flat -- one dir per package at the repo ROOT (builds <pkg>/). Real example:
#    github.com/kth5/archpower
#[FLAT]
#  github.com/kth5/archpower

# 3) Subdir-container -- one dir per package under a shared <subdir> (builds <subdir>/<pkg>).
#    A tree URL encodes the dir; a bare URL needs --subdir.
#[VUR]
#  https://github.com/h8d13/VUR/tree/master/pkgs

# 4) Branch-per-package -- one package per branch; put {pkg} IN the branch of a tree URL.
#    A bare URL line just clones the default branch; `--rev {pkg}` does it per command on
#    any URL. Forge forms:
#      github:           github.com/u/r/tree/{pkg}
#      gitlab:           gitlab.com/u/r/-/tree/{pkg}        (GitLab needs the /-/ )
#      gitea/forgejo:    host/u/r/src/branch/{pkg}          (codeberg, self-hosted, ...)
#      bitbucket:        bitbucket.org/u/r/src/{pkg}        (ref straight after /src/)
#[XUR]
#  gitlab.com/myuser/myaur/-/tree/{pkg}

# 5) Repo-per-package -- {pkg} or {pkgbase} in the path (one repo per package on a forge).
#[FORGE]
#  git.example.org/pkgs/{pkg}.git

# 6) Fallback mirrors -- list several URLs under one name; the first that clones wins.
#[MIRRORED]
#  github.com/myuser/myaur/tree/master/pkgs
#  codeberg.org/myuser/myaur/tree/master/pkgs

# 7) Bare repos -- any git-cloneable URL works as-is (private/self-hosted). No tree/<ref> in
#    the URL to parse, so scope with --rev / --subdir (--rev {pkg} = branch-per-package).
#    scp-form has no port field; use ssh:// for a custom port.
#[PRIV]
#  git@git.example.org:myuser/my-pkg.git
#  ssh://git@host:port/myuser/myfolder/{pkgbase}.git

# --- The AUR git mirror (one branch per package). Reserved toggle: [AUR] holds
# true/false, NOT a URL. Off by default (opt-in). Set true to enable it in the default
# chain, search, and `list --repo AUR`; move it above [ARCH] to make it your default.
# (An explicit `--repo AUR` always works as a deliberate override, even when off.)
[AUR]
false
