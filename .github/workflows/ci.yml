name: CI

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install lint/type tools
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check grimoire tests/
      - name: Ruff format
        run: ruff format --check grimoire tests/
      - name: Type check
        run: mypy grimoire tests/
      # discover via unittest so CI needs no pytest dependency
      - name: Unit tests
        run: python -m unittest discover -s tests -t tests -v

  smoke:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      options: --privileged

    env:
      PKG: yay
      PATTERN: python

    defaults:
      run:
        shell: sudo -H -u builder --preserve-env=PKG,PATTERN,DEBUG bash -eo pipefail {0}

    steps:
      - uses: actions/checkout@v4
        # checkout runs before our default shell takes effect

      - run: pacman-key --init
        shell: bash
      - run: pacman --noconfirm -Sy archlinux-keyring
        shell: bash
      - run: pacman --noconfirm -S --needed git python base-devel
        shell: bash

      - name: Setup builder user
        shell: bash
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
# setup done; all steps below run as builder via defaults.run.shell
      - run: ./grimoire --help

      # --- Custom repo (VUR): build grimoire-git from a custom source, before the AUR ---
      - name: Build grimoire-git from a custom repo (VUR)
        run: |
          # scheme-less, subdir-per-pkg container alias; `repo` never auto-seeds a conf
          ./grimoire repo --add 'github.com/h8d13/VUR/tree/master/pkgs' VUR
          ./grimoire repo --ls
          ./grimoire install grimoire-git --repo VUR --noconfirm
          # verify it was built from the custom source (origin is VUR, not the AUR)
          git -C ~/.cache/grimoire/grimoire-git remote get-url origin | grep -q 'h8d13/VUR'
          pacman -Q grimoire-git
          echo "grimoire-git built from VUR: PASS"

      - name: Custom-repo reads (default source, search, {pkgbase})
        run: |
          ./grimoire repo --add 'https://gitlab.archlinux.org/archlinux/packaging/packages/{pkgbase}.git' ARCH
          # bare command (no --repo) uses the top section = VUR -> descends pkgs/<pkg>
          ./grimoire fetch grimoire-git | grep -q 'pkgs/grimoire-git'
          ./grimoire search '' --repo VUR --no-interactive --plain | grep -q 'vscodium-rel'
          ./grimoire search bash --repo ARCH --no-interactive --plain | grep -qE '(core|extra)/bash'
          # bare search aggregates ALL conf sections -> VUR shows without --repo
          ./grimoire search vscodium-rel --no-interactive --plain | grep -q 'VUR/vscodium-rel'
          # split package resolves name -> pkgbase via the sync DB
          ./grimoire inspect amd-ucode --repo ARCH --target PKGBUILD | grep -q '^pkgbase=linux-firmware'
          ./grimoire update grimoire-git --repo VUR --noconfirm 2>&1 | tee /tmp/upd.log
          grep -q 'up to date' /tmp/upd.log

      - name: Test --use-ssh rewrites URLs (clone fails, but rewrite worked)
        env:
          DEBUG: "1"
        run: |
          ./grimoire fetch archinstoo --use-ssh --shallow --repo-url https://github.com/h8d13/archinstoo 2>&1 | tee /tmp/ssh.log || true
          grep -qF 'ssh://git@github.com/h8d13/archinstoo' /tmp/ssh.log; echo "URL re-written PASS." \
            || { echo "FAIL: --use-ssh did not rewrite URL to ssh://"; exit 1; }

      # --- AUR backend: opt in ([AUR] as the only/first section) and exercise it ---
      - name: Enable the AUR and run AUR-backed tests (yay)
        run: |
          rm -f ~/.config/grimoire/repos.conf
          ./grimoire repo --add 'https://aur.archlinux.org/rpc/' AUR
          ./grimoire repo --add 'https://github.com/archlinux/aur.git' AUR
          ./grimoire fetch $PKG
          ./grimoire --refresh fetch $PKG
          ./grimoire fetch --force $PKG
          rm -rf ~/.cache/grimoire/$PKG
          ./grimoire --shallow fetch $PKG
          count=$(git -C ~/.cache/grimoire/$PKG rev-list --count HEAD)
          [ "$count" = "1" ] && echo "shallow depth=1 PASS" || { echo "expected 1, got $count"; exit 1; }
          ./grimoire --git-mirror fetch --force $PKG
          ./grimoire inspect $PKG --target PKGBUILD
          time ./grimoire search $PATTERN --no-interactive
          ./grimoire install $PKG --noconfirm       # bare -> default [AUR]
          pacman -Q $PKG
          echo "$PKG built from AUR: PASS"

      # --- First run with no conf auto-seeds an [ARCH] default (AUR opt-in) ---
      - name: First run seeds an [ARCH] default conf
        run: |
          rm -f ~/.config/grimoire/repos.conf
          ./grimoire inspect bash --target PKGBUILD | grep -q '^pkgname=bash'   # bare -> auto [ARCH]
          test -f ~/.config/grimoire/repos.conf
          grep -q '^\[ARCH\]' ~/.config/grimoire/repos.conf
          grep -q '^#\[AUR\]' ~/.config/grimoire/repos.conf

      - run: ./grimoire list
