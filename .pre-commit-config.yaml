repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-i", "0", "-ci", "-ln", "bash", "-d"]
        files: ^PKGBUILD$
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
    - id: mypy
      args: [--strict]
      fail_fast: true
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.410
    hooks:
      - id: pyright
        pass_filenames: false  # check the [tool.pyright] include set, not just staged files
  - repo: https://github.com/pylint-dev/pylint
    rev: v4.0.6
    hooks:
      - id: pylint
        files: ^grimoire$
  - repo: local
    hooks:
      - id: outline
        name: refresh embedded code outline
        entry: tools/outline grimoire
        language: system
        files: ^grimoire$
        pass_filenames: false

